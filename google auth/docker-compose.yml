version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: google-auth-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: google_auth_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
